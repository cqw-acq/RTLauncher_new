name: 'Tauri App Build PR Test'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, labeled]

jobs:
  test-tauri:
    if: |
      github.event_name == 'push' ||
      github.event.action == 'opened' || 
      github.event.action == 'synchronize' || 
      (github.event.action == 'labeled' && github.event.label.name == '需要 Action 构建')
    
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS ARM64'
            artifact_name: 'macos-arm64'
            bundle_path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS x64'
            artifact_name: 'macos-x64'
            bundle_path: 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
            artifact_name: 'linux'
            bundle_path: 'src-tauri/target/release/bundle/deb/*.deb'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'
            artifact_name: 'windows'
            # 核心修改：专门提取 NSIS 生成的 setup.exe 文件
            bundle_path: 'src-tauri/target/release/bundle/nsis/*.exe'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.args }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - if: matrix.platform == 'ubuntu-22.04'
        name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: pnpm install --ignore-workspace

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_INCREMENTAL: 1
          RUSTFLAGS: ${{ matrix.platform == 'macos-latest' && '-C split-debuginfo=unpacked' || '' }}
        with:
          args: ${{ matrix.args }}

      - name: Upload Bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error
          retention-days: 7

    outputs:
      result: ${{ job.status }}

  report-status:
    needs: test-tauri
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Report build status
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = ('${{ needs.test-tauri.result }}' === 'success') 
              ? `### ✅ 构建成功！\n\nWindows 版 Setup.exe 及其他平台安装包已生成。\n\n[点击前往下载页面](${runUrl})` 
              : `### ❌ 构建失败\n\n请检查 [错误日志](${runUrl})`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Remove build label
        if: always() && github.event.action == 'labeled' && github.event.label.name == '需要 Action 构建'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: '需要 Action 构建'
              });
            } catch (e) {}
