name: 'Tauri App Build PR Test'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, labeled]

jobs:
  test-tauri:
    if: |
      github.event_name == 'push' ||
      github.event.action == 'opened' || 
      github.event.action == 'synchronize' || 
      (github.event.action == 'labeled' && github.event.label.name == '需要 Action 构建')
    
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            name: 'macOS ARM64'
            artifact_name: 'macos-arm64'
            bundle_path: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            name: 'macOS x64'
            artifact_name: 'macos-x64'
            bundle_path: 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: 'ubuntu-22.04'
            args: ''
            name: 'Linux'
            artifact_name: 'linux'
            bundle_path: 'src-tauri/target/release/bundle/deb/*.deb'
          - platform: 'windows-latest'
            args: ''
            name: 'Windows'
            artifact_name: 'windows'
            bundle_path: 'src-tauri/target/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 1. 前端环境与缓存优化 ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      # --- 2. Rust 环境与增量编译缓存 ---
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.args }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      # --- 3. 系统依赖安装 (仅 Linux) ---
      - if: matrix.platform == 'ubuntu-22.04'
        name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        # 核心修复：增加 --ignore-workspace 避免配置失效导致的 ERR_PNPM_INVALID_WORKSPACE_CONFIGURATION
        run: pnpm install --ignore-workspace

      # --- 4. 执行 Tauri 构建 ---
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_INCREMENTAL: 1
          RUSTFLAGS: ${{ matrix.platform == 'macos-latest' && '-C split-debuginfo=unpacked' || '' }}
        with:
          args: ${{ matrix.args }}

      # --- 5. 产物上传 (只提取 .dmg/.msi/.deb) ---
      - name: Upload Bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bundle
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error
          retention-days: 7

    outputs:
      result: ${{ job.status }}

  report-status:
    needs: test-tauri
    # 仅在 PR 环境下尝试发表评论，避免在 main 分支直接提交时报错
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Report build status
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            let body;
            if ('${{ needs.test-tauri.result }}' === 'success') {
              body = `### ✅ 构建成功！\n\n编译已完成，您可以点击下方链接跳转到页面底部的 **Artifacts** 处下载安装包：\n\n🔗 [查看构建产物](${runUrl})\n\n> 💡 **小贴士**: 本次已启用增量编译缓存，后续构建速度将显著提升。`;
            } else {
              body = `### ❌ 构建失败\n\n编译过程中遇到了错误，请查看日志排查：\n\n🔗 [查看错误日志](${runUrl})`;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Remove build label
        if: always() && github.event.action == 'labeled' && github.event.label.name == '需要 Action 构建'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: '需要 Action 构建'
              });
            } catch (e) {
              console.log('无法移除标签，可能已被手动移除');
            }
